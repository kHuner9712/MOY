name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  lint_test_build:
    name: Lint, Test and Build
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
      SELF_SALES_ORG_ID: 00000000-0000-0000-0000-000000000000
      AI_PROVIDER: deepseek
      DEEPSEEK_API_KEY: ci-placeholder-deepseek-key
      AI_ANALYSIS_TIMEOUT_MS: 30000
      AI_FALLBACK_TO_RULE_ENGINE: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
